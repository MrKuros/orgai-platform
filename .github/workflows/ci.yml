name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: API — Build & Test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
      # DIRECT_DATABASE_URL must be non-empty for Prisma schema validation.
      # Fall back to DATABASE_URL when the test DB doesn't use a separate direct URL.
      DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL_TEST || secrets.DATABASE_URL_TEST }}
      JWT_SECRET: test-jwt-secret-for-ci-only
      WORKOS_API_KEY: placeholder
      WORKOS_CLIENT_ID: placeholder
      WORKOS_REDIRECT_URI: http://localhost:8080/v1/auth/sso/callback
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build @comply/core
        run: cd packages/core && npm run build
      - name: Generate Prisma client
        run: cd api && npx prisma generate
      - name: Build
        run: cd api && npm run build
      - name: Run migrations
        run: cd api && npx prisma migrate deploy
      - name: Run tests
        run: cd api && npm test

  test-mcp:
    name: MCP — Build & Test
    runs-on: ubuntu-latest
    env:
      COMPLY_API_KEY: ""   # Explicit empty — exercises standalone mode only in CI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build core
        run: cd packages/core && npm run build
      - name: Build MCP
        run: cd mcp && npm run build
      - name: Run tests
        run: cd mcp && npm test

  test-dashboard:
    name: Dashboard — Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: cd dashboard && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.orgai.dev
      - name: Lint
        run: cd dashboard && npm run lint

  test-dashboard-e2e:
    name: Dashboard — E2E Tests
    runs-on: ubuntu-latest
    needs: [test-api]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: orgai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/orgai_test
      DIRECT_DATABASE_URL: postgresql://test:test@localhost:5432/orgai_test
      JWT_SECRET: test-jwt-secret-for-ci-only
      WORKOS_API_KEY: placeholder
      WORKOS_CLIENT_ID: placeholder
      WORKOS_REDIRECT_URI: http://localhost:8080/v1/auth/sso/callback
      NEXT_PUBLIC_API_URL: http://localhost:8080
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build core
        run: cd packages/core && npm run build
      - name: Setup database
        run: |
          cd api
          npx prisma generate
          npx prisma migrate deploy
      - name: Start API server
        run: cd api && npm run dev &
        env:
          PORT: 8080
      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8080/health && break || sleep 1
          done
      - name: Install Playwright Browsers
        run: cd dashboard && npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd dashboard && npm run test:e2e

  test-extension:
    name: Extension — Build & Test
    runs-on: ubuntu-latest
    continue-on-error: true  # VS Code headless tests can be flaky in CI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build core
        run: cd packages/core && npm run build
      - name: Build extension
        run: cd extension && npm run compile
      - name: Setup virtual display for VS Code tests
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &
      - name: Run tests
        run: cd extension && npm test
        env:
          DISPLAY: ':99'

# Deployment is handled by the hosting platforms' native git integration,
# not by this workflow:
#   - API:       Render Blueprint (render.yaml) auto-builds on push to main.
#                Migrations run at boot via the render.yaml dockerCommand.
#                In Render, set "Auto-Deploy: After CI Checks Pass" to gate on the
#                test jobs above. The hosted MCP endpoints ship inside this service.
#   - Dashboard: Vercel GitHub app auto-builds the `dashboard/` root on push to main.
# The old Railway (deploy-api) and Vercel CLI (deploy-dashboard) jobs were removed
# when the project migrated off Railway. See DEPLOY.md for the full runbook.
