name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: API — Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: orgai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Ephemeral service container — no repo secrets needed.
      DATABASE_URL: postgresql://test:test@localhost:5432/orgai_test
      DIRECT_DATABASE_URL: postgresql://test:test@localhost:5432/orgai_test
      JWT_SECRET: test-jwt-secret-for-ci-only
      WORKOS_API_KEY: placeholder
      WORKOS_CLIENT_ID: placeholder
      WORKOS_REDIRECT_URI: http://localhost:8080/v1/auth/sso/callback
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build @comply/core
        run: cd packages/core && npm run build
      - name: Generate Prisma client
        run: cd api && npx prisma generate
      - name: Build
        run: cd api && npm run build
      - name: Run migrations
        run: cd api && npx prisma migrate deploy
      - name: Run tests
        run: cd api && npm test

  test-mcp:
    name: MCP — Build & Test
    runs-on: ubuntu-latest
    env:
      COMPLY_API_KEY: ""   # Explicit empty — exercises standalone mode only in CI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build core
        run: cd packages/core && npm run build
      - name: Build MCP
        run: cd mcp && npm run build
      - name: Run tests
        run: cd mcp && npm test

  test-dashboard:
    name: Dashboard — Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: cd dashboard && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.orgai.dev
      - name: Lint
        run: cd dashboard && npm run lint

  test-dashboard-e2e:
    name: Dashboard — E2E Tests
    runs-on: ubuntu-latest
    needs: [test-api]
# e2e suite is stabilized (self-seeding auth, resilient selectors) and now gates.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: orgai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/orgai_test
      DIRECT_DATABASE_URL: postgresql://test:test@localhost:5432/orgai_test
      JWT_SECRET: test-jwt-secret-for-ci-only
      WORKOS_API_KEY: placeholder
      WORKOS_CLIENT_ID: placeholder
      WORKOS_REDIRECT_URI: http://localhost:8080/v1/auth/sso/callback
      NEXT_PUBLIC_API_URL: http://localhost:8080
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build core
        run: cd packages/core && npm run build
      - name: Setup database
        run: |
          cd api
          npx prisma generate
          npx prisma migrate deploy
      - name: Start API server
        run: cd api && npm run dev &
        env:
          PORT: 8080
      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8080/health && break || sleep 1
          done
      - name: Install Playwright Browsers
        run: cd dashboard && npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd dashboard && npm run test:e2e

  test-extension:
    name: Extension — Build & Test
    runs-on: ubuntu-latest
    continue-on-error: true  # VS Code headless tests can be flaky in CI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build core
        run: cd packages/core && npm run build
      - name: Build extension
        run: cd extension && npm run compile
      - name: Setup virtual display for VS Code tests
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &
      - name: Run tests
        run: cd extension && npm test
        env:
          DISPLAY: ':99'

# No deployments run from this workflow — CI is build + test only.
# Delivery model is self-hosted: clients install from the offline bundle
# (selfhost/build-bundle.sh). render.yaml / dashboard/vercel.json remain in the
# repo as inert configs in case a cloud demo is ever wired up; nothing fires
# unless those platforms are explicitly connected to this repository.
